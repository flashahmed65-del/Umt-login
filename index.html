<html>
<head>
    <title>UMT Login Page</title>
</head>
<body background="background.png">
    
    <center>
        <br><br><br><br><br><br> 

        <img src="logo.png" width="150">
        
        <br><br>
        
        <table bgcolor="white" border="0" cellpadding="30" width="450"> 
            <tr>
                <td>
                    <h3>Already have an account?</h3>
                    
                    <form>
                        <table border="1" bordercolor="#eceeef" cellspacing="0" cellpadding="5" width="100%">
                            <tr>
                                <td bgcolor="#f0f0f0" width="30" align="center"><img src="usernameicon.png" width="20"></td>
                                <td><input type="text" placeholder="Username" size="30"></td>
                            </tr>
                            <tr>
                                <td bgcolor="#f0f0f0" width="30" align="center"><img src="passwordicon.png" width="20"></td>
                                <td><input type="password" placeholder="Password" size="30"></td>
                            </tr>
                        </table>
                        
                        <br>
                        
                        <input type="checkbox"> <font color="#373A3C" size="2">Remember username</font>
                        
                        <br><br>
                        
                        <input type="submit" value="Log in" style="background-color: #0381aa; color: #ffffff; width: 100%; padding: 10px; border: none;">
                    </form>
                    
                    <br>
                    
                    <a href="#" style="text-decoration: none;"><font color="#0381aa">Forgotten your username or password?</font></a>
                    
                </td>
            </tr>
        </table>

    </center>
    
</body>
</html>
